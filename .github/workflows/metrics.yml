name: Metrics
on:
  # Roda automaticamente todo dia à meia-noite (horário UTC)
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente na aba "Actions" do GitHub quando quiser
  workflow_dispatch:
  # Roda também sempre que você der push no repositório
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # === CARD 1: Header limpo com tema escuro moderno ===
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.header.svg
          template: classic
          base: header
          config_display: large
          config_theme: dark
          config_animations: yes

      # === CARD 2: Calendário 3D de commits (o que você curtiu) ===
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_display: large
          config_theme: dark
          config_animations: yes

      # === CARD 3: Linguagens mais usadas, em formato donut (mais moderno) ===
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_threshold: 2%
          config_display: large
          config_theme: dark
          config_animations: yes
